<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div style="font-family:'Boogaloo',cursive; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:36px;">
      ⚡ THE TRANSFORMATION
    </div>

    <!-- Before block -->
    <div style="background:rgba(255,255,255,0.03); border:1.5px solid rgba(255,255,255,0.08); border-radius:18px; padding:28px 36px; margin-bottom:16px; position:relative;">
      <div style="font-family:'Boogaloo',cursive; font-size:18px; letter-spacing:3px; color:rgba(255,255,255,0.3); margin-bottom:10px;">BEFORE</div>
      <div style="font-family:'Boogaloo',cursive; font-size:46px; color:rgba(255,255,255,0.5); line-height:1.1;">{{before}}</div>
    </div>

    <!-- Arrow -->
    <div style="text-align:center; font-size:36px; margin-bottom:16px; color:#FF6B35;">↓</div>

    <!-- After block -->
    <div style="background:rgba(255,107,53,0.08); border:1.5px solid rgba(255,107,53,0.35); border-radius:18px; padding:28px 36px; margin-bottom:36px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; right:0; width:180px; height:180px; background:radial-gradient(circle at 100% 0%, rgba(255,107,53,0.15), transparent 70%);"></div>
      <div style="font-family:'Boogaloo',cursive; font-size:18px; letter-spacing:3px; color:#FF6B35; margin-bottom:10px;">AFTER</div>
      <div style="font-family:'Boogaloo',cursive; font-size:46px; color:#fff; line-height:1.1;">{{after}}</div>
    </div>

    <!-- Body -->
    <div style="font-size:28px; color:rgba(255,255,255,0.7); line-height:1.7;">{{body}}</div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
