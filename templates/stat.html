<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content" style="justify-content:center; text-align:center; align-items:center;">
    <!-- Eyebrow -->
    <div style="font-family:'Boogaloo',cursive; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:36px;">
      {{eyebrow}}
    </div>

    <!-- Big stat -->
    <div style="font-family:'Boogaloo',cursive; font-size:180px; line-height:1; background:linear-gradient(135deg,#FF6B35,#FFD700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:16px;">
      {{stat}}
    </div>

    <!-- Headline -->
    <div style="font-family:'Boogaloo',cursive; font-size:48px; color:#fff; line-height:1.2; max-width:800px; margin-bottom:36px;">
      {{headline}}
    </div>

    <!-- Divider -->
    <div style="width:60px; height:4px; background:linear-gradient(90deg,#FF6B35,#7C3AED); border-radius:2px; margin-bottom:36px;"></div>

    <!-- Body -->
    <div style="font-size:26px; color:rgba(255,255,255,0.6); line-height:1.65; max-width:800px;">
      {{body}}
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
