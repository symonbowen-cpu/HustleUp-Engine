<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div style="font-family:'Boogaloo',cursive; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:36px;">
      🧠 MYTH VS FACT
    </div>

    <!-- Myth block -->
    <div style="background:rgba(239,68,68,0.08); border:1.5px solid rgba(239,68,68,0.25); border-radius:18px; padding:30px 36px; margin-bottom:20px;">
      <div style="font-family:'Boogaloo',cursive; font-size:20px; letter-spacing:3px; color:#EF4444; margin-bottom:12px;">❌ MYTH</div>
      <div style="font-family:'Boogaloo',cursive; font-size:40px; color:rgba(255,255,255,0.7); line-height:1.2;">"{{myth}}"</div>
    </div>

    <!-- Fact block -->
    <div style="background:rgba(16,185,129,0.08); border:1.5px solid rgba(16,185,129,0.3); border-radius:18px; padding:30px 36px; margin-bottom:32px;">
      <div style="font-family:'Boogaloo',cursive; font-size:20px; letter-spacing:3px; color:#10B981; margin-bottom:12px;">✅ FACT</div>
      <div style="font-family:'Boogaloo',cursive; font-size:42px; color:#fff; line-height:1.2;">{{fact}}</div>
    </div>

    <!-- Body -->
    <div style="font-size:27px; color:rgba(255,255,255,0.65); line-height:1.65;">{{body}}</div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
