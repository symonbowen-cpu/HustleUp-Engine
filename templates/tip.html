<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow tag -->
    <div style="margin-bottom:32px;">
      <span class="tag">{{eyebrow}}</span>
    </div>

    <!-- Headline -->
    <div style="font-family:'Boogaloo',cursive; font-size:72px; line-height:1.05; margin-bottom:32px; background:linear-gradient(135deg,#fff 0%,#FF6B35 60%,#7C3AED 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
      {{headline}}
    </div>

    <!-- Divider -->
    <div style="width:80px; height:4px; background:linear-gradient(90deg,#FF6B35,#7C3AED); border-radius:2px; margin-bottom:32px;"></div>

    <!-- Body -->
    <div style="font-size:30px; color:rgba(255,255,255,0.72); line-height:1.7; max-width:900px;">
      {{body}}
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
