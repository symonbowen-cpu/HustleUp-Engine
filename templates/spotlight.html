<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div style="font-family:'Boogaloo',cursive; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:20px;">
      💰 HUSTLE SPOTLIGHT
    </div>

    <!-- Hustle name + emoji -->
    <div style="display:flex; align-items:center; gap:18px; margin-bottom:28px;">
      <div style="width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,#FF6B35,#FF3366); display:flex; align-items:center; justify-content:center; font-size:38px; flex-shrink:0;">{{emoji}}</div>
      <div>
        <div style="font-family:'Boogaloo',cursive; font-size:38px; color:#fff; line-height:1;">{{hustle}}</div>
        <div style="font-size:18px; color:rgba(255,255,255,0.45); margin-top:4px;">First $ in {{timeToFirst}}</div>
      </div>
    </div>

    <!-- Big earning stat -->
    <div style="background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,107,53,0.3); border-radius:20px; padding:32px 36px; margin-bottom:28px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; right:0; width:200px; height:200px; background:radial-gradient(circle at 100% 0%, rgba(255,107,53,0.12), transparent 70%);"></div>
      <div style="font-family:'Boogaloo',cursive; font-size:18px; letter-spacing:3px; color:rgba(255,255,255,0.4); margin-bottom:8px;">EARNING POTENTIAL</div>
      <div style="font-family:'Boogaloo',cursive; font-size:88px; line-height:1; background:linear-gradient(135deg,#FF6B35,#FFD700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">{{stat}}</div>
    </div>

    <!-- Body -->
    <div style="font-size:28px; color:rgba(255,255,255,0.75); line-height:1.65; margin-bottom:28px;">{{body}}</div>

    <!-- Hook -->
    <div style="font-family:'Boogaloo',cursive; font-size:32px; color:#FF6B35; line-height:1.3;">{{hook}}</div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
