<div class="card">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div style="font-family:'Boogaloo',cursive; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:24px;">
      {{eyebrow}}
    </div>

    <!-- Feature name badge -->
    <div style="display:inline-flex; align-items:center; gap:12px; background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(255,107,53,0.2)); border:1.5px solid rgba(124,58,237,0.4); border-radius:100px; padding:12px 28px; margin-bottom:32px;">
      <div style="width:12px; height:12px; border-radius:50%; background:#7C3AED; box-shadow:0 0 10px #7C3AED;"></div>
      <div style="font-family:'Boogaloo',cursive; font-size:26px; color:#a78bfa; letter-spacing:1px;">{{feature_name}}</div>
    </div>

    <!-- Headline -->
    <div style="font-family:'Boogaloo',cursive; font-size:74px; line-height:1.05; margin-bottom:32px; color:#fff;">
      {{headline}}
    </div>

    <!-- Purple divider -->
    <div style="width:80px; height:4px; background:linear-gradient(90deg,#7C3AED,#FF6B35); border-radius:2px; margin-bottom:32px;"></div>

    <!-- Body -->
    <div style="font-size:30px; color:rgba(255,255,255,0.7); line-height:1.7; max-width:900px;">
      {{body}}
    </div>

    <!-- Feature pills -->
    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:40px;">
      <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:8px 20px; font-family:'Boogaloo',cursive; font-size:20px; color:rgba(255,255,255,0.5);">8 Hustles</div>
      <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:8px 20px; font-family:'Boogaloo',cursive; font-size:20px; color:rgba(255,255,255,0.5);">AI Coach</div>
      <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:8px 20px; font-family:'Boogaloo',cursive; font-size:20px; color:rgba(255,255,255,0.5);">XP System</div>
      <div style="background:rgba(255,107,53,0.12); border:1px solid rgba(255,107,53,0.3); border-radius:100px; padding:8px 20px; font-family:'Boogaloo',cursive; font-size:20px; color:#FF6B35;">$19.99 lifetime</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
