<div class="card" data-duration="12000">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div class="anim" data-fx="slide-down" data-at="350" data-sfx="whoosh-up"
         style="font-family:'Boogaloo',cursive; font-size:34px; letter-spacing:5px; color:var(--white40); margin-bottom:64px;">
      📱 {{eyebrow}}
    </div>

    <!-- Feature name card -->
    <div class="anim" data-fx="pop" data-at="1100" data-dur="700" data-sfx="pop"
         style="background:linear-gradient(135deg, rgba(124,58,237,0.18), rgba(255,107,53,0.12)); border:2px solid rgba(124,58,237,0.4); border-radius:30px; padding:56px 60px; margin-bottom:64px;">
      <div class="anim" data-fx="float" data-at="1800" data-dur="3000"
           style="font-family:'Boogaloo',cursive; font-size:92px; line-height:1.1;" >
        <span class="grad-text">{{feature_name}}</span>
      </div>
    </div>

    <!-- Headline -->
    <div class="anim" data-fx="slide-up" data-at="2900" data-sfx="whoosh-up"
         style="font-family:'Boogaloo',cursive; font-size:60px; color:#fff; line-height:1.25; margin-bottom:56px;">{{headline}}</div>

    <!-- Body -->
    <div class="anim" data-fx="slide-up" data-at="5200" data-sfx="pop"
         style="font-size:40px; color:var(--white60); line-height:1.65;">{{body}}</div>

    <!-- CTA -->
    <div class="anim" data-fx="pop" data-at="8800" data-sfx="riser" style="margin-top:80px;">
      <div class="anim tag" data-fx="pulse" data-at="9600" data-dur="1600" style="font-size:36px; padding:18px 46px;">SHOW YOUR TEEN → {{url}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
