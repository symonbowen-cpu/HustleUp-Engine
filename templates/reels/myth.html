<div class="card" data-duration="12000">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div class="anim" data-fx="slide-down" data-at="350" data-sfx="whoosh-up"
         style="font-family:'Boogaloo',cursive; font-size:34px; letter-spacing:5px; color:var(--white40); margin-bottom:60px;">
      🧠 MYTH VS FACT
    </div>

    <!-- Myth block -->
    <div class="anim" data-fx="slide-right" data-at="1000" data-sfx="pop"
         style="background:rgba(239,68,68,0.08); border:2px solid rgba(239,68,68,0.25); border-radius:26px; padding:48px 54px; margin-bottom:36px;">
      <div style="font-family:'Boogaloo',cursive; font-size:30px; letter-spacing:4px; color:#EF4444; margin-bottom:18px;">❌ MYTH</div>
      <div style="font-family:'Boogaloo',cursive; font-size:58px; color:rgba(255,255,255,0.7); line-height:1.25;">"{{myth}}"</div>
    </div>

    <!-- Strike-through beat -->
    <div class="anim" data-fx="punch" data-at="3200" data-dur="600" data-sfx="whoosh-down"
         style="font-family:'Boogaloo',cursive; font-size:44px; color:var(--white40); text-align:center; margin-bottom:36px;">
      ⬇️ here's the truth
    </div>

    <!-- Fact block -->
    <div class="anim" data-fx="slide-left" data-at="4400" data-sfx="ding"
         style="background:rgba(16,185,129,0.08); border:2px solid rgba(16,185,129,0.3); border-radius:26px; padding:48px 54px; margin-bottom:48px;">
      <div style="font-family:'Boogaloo',cursive; font-size:30px; letter-spacing:4px; color:var(--green); margin-bottom:18px;">✅ FACT</div>
      <div style="font-family:'Boogaloo',cursive; font-size:62px; color:#fff; line-height:1.25;">{{fact}}</div>
    </div>

    <!-- Body -->
    <div class="anim" data-fx="slide-up" data-at="6600" data-sfx="whoosh-up"
         style="font-size:38px; color:var(--white60); line-height:1.6;">{{body}}</div>

    <!-- CTA -->
    <div class="anim" data-fx="pop" data-at="8800" data-sfx="riser" style="margin-top:70px; text-align:center;">
      <div class="anim tag" data-fx="pulse" data-at="9600" data-dur="1600" style="font-size:36px; padding:18px 46px;">GIVE THEM A START → {{url}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
