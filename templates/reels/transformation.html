<div class="card" data-duration="12000">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- Eyebrow -->
    <div class="anim" data-fx="slide-down" data-at="350" data-sfx="whoosh-up"
         style="font-family:'Boogaloo',cursive; font-size:34px; letter-spacing:5px; color:var(--white40); margin-bottom:70px;">
      🔄 THE GLOW UP
    </div>

    <!-- Before -->
    <div class="anim" data-fx="slide-right" data-at="1000" data-sfx="pop"
         style="background:var(--white08); border:2px solid var(--white20); border-radius:26px; padding:48px 54px; margin-bottom:40px; filter:grayscale(0.4);">
      <div style="font-family:'Boogaloo',cursive; font-size:30px; letter-spacing:4px; color:var(--white40); margin-bottom:16px;">BEFORE</div>
      <div style="font-family:'Boogaloo',cursive; font-size:56px; color:rgba(255,255,255,0.65); line-height:1.25;">{{before}}</div>
    </div>

    <!-- Arrow beat -->
    <div class="anim" data-fx="punch" data-at="3000" data-dur="600" data-sfx="whoosh-down"
         style="text-align:center; font-size:70px; margin-bottom:40px;">⬇️</div>

    <!-- After -->
    <div class="anim" data-fx="pop" data-at="4200" data-dur="750" data-sfx="ding"
         style="background:rgba(255,107,53,0.10); border:2px solid rgba(255,107,53,0.45); border-radius:26px; padding:48px 54px; margin-bottom:56px;">
      <div style="font-family:'Boogaloo',cursive; font-size:30px; letter-spacing:4px; color:var(--orange); margin-bottom:16px;">AFTER</div>
      <div class="grad-text" data-countup data-at="4200" data-dur="1100"
           style="font-family:'Boogaloo',cursive; font-size:64px; line-height:1.25;">{{after}}</div>
    </div>

    <!-- Body -->
    <div class="anim" data-fx="slide-up" data-at="6600" data-sfx="whoosh-up"
         style="font-size:38px; color:var(--white60); line-height:1.6;">{{body}}</div>

    <!-- CTA -->
    <div class="anim" data-fx="pop" data-at="8800" data-sfx="riser" style="margin-top:70px; text-align:center;">
      <div class="anim tag" data-fx="pulse" data-at="9600" data-dur="1600" style="font-size:36px; padding:18px 46px;">MAKE IT REAL → {{url}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">{{handle}}</div>
    <div class="footer-logo">🚀 HustleUp</div>
    <div class="footer-url">{{url}}</div>
  </div>
</div>
